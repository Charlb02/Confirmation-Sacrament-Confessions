<!DOCTYPE html>
<html lang="ar" dir="rtl" id="app">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>فحص الضمير — التثبيت</title>
<style>
:root{--p:#6C3483;--pl:#9B59B6;--g:#1A7A4A;--gl:#27AE60;--a:#B7950B;--al:#F4D03F;--bg:#F9F6FF;--tx:#2C1254;--txl:#7F8C8D;--sh:0 4px 16px rgba(108,52,131,.12);--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--tx);max-width:620px;margin:0 auto;padding:14px;}

/* ── ROLE PICKER SCREEN ── */
#scr-role{min-height:90vh;display:flex;flex-direction:column;justify-content:center;}
.role-hdr{background:linear-gradient(135deg,#6C3483,#4A235A);border-radius:16px;padding:22px 16px 18px;margin-bottom:24px;color:#fff;text-align:center;}
.role-hdr h1{font-size:24px;margin-bottom:6px;}
.role-hdr p{font-size:14px;opacity:.85;line-height:1.5;}
.role-lang-row{display:flex;justify-content:center;gap:8px;margin-bottom:14px;}
.role-cards{display:flex;gap:14px;}
.role-card{flex:1;background:#fff;border:3px solid #D7BDE2;border-radius:18px;padding:24px 12px 20px;cursor:pointer;text-align:center;transition:all .2s;box-shadow:var(--sh);}
.role-card:hover,.role-card:active{border-color:var(--p);background:#F4ECF7;transform:scale(.98);}
.role-card .r-icon{font-size:52px;margin-bottom:10px;}
.role-card .r-name-ar{font-size:20px;font-weight:800;color:var(--p);margin-bottom:4px;}
.role-card .r-name-en{font-size:13px;color:var(--txl);font-weight:600;}
.role-card .r-desc{font-size:13px;color:var(--txl);line-height:1.5;margin-top:8px;}

/* ── SHARED ── */
.hdr{background:linear-gradient(135deg,#6C3483,#4A235A);border-radius:16px;padding:18px 16px 14px;margin-bottom:16px;color:#fff;text-align:center;position:relative;}
.hdr h1{font-size:22px;margin-bottom:5px;}
.hdr p{font-size:14px;opacity:.85;line-height:1.5;}
.lang-row{display:flex;justify-content:center;gap:8px;margin-bottom:12px;}
.lang-btn{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.3);border-radius:99px;padding:5px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.lang-btn.act{background:#fff;color:var(--p);border-color:#fff;}
.role-badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:99px;padding:4px 14px;font-size:12px;font-weight:700;margin-bottom:8px;cursor:pointer;}
.role-badge:hover{background:rgba(255,255,255,.3);}
.intro{background:#FDF9FF;border:2px solid #D7BDE2;border-radius:var(--r);padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.8;color:#4A235A;}
.intro strong{color:var(--p);display:block;margin-bottom:6px;font-size:15px;}
.intro ol{padding-right:18px;padding-left:18px;}
.intro li{margin-bottom:3px;}
.counter{text-align:center;padding:10px 14px;font-size:14px;font-weight:700;color:var(--p);background:#EDE0F5;border-radius:10px;margin-bottom:14px;}
.section{margin-bottom:14px;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.sec-title{display:flex;align-items:center;gap:8px;background:var(--p);color:#fff;padding:11px 14px;font-size:15px;font-weight:700;}
.questions{background:#fff;border:2px solid #E8D5F0;border-top:none;border-radius:0 0 var(--r) var(--r);}
.q-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:1px solid #F4ECF7;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.q-item:last-child{border-bottom:none;}
.q-item:active{background:#F9F0FF;}
.q-check{width:24px;height:24px;border:2px solid #C9A0DC;border-radius:7px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:15px;}
.q-item.done .q-check{background:var(--p);border-color:var(--p);color:#fff;}
.q-text{font-size:15px;line-height:1.6;flex:1;}
.q-item.done .q-text{color:#aaa;text-decoration:line-through;}
.view-btn{display:block;width:100%;padding:15px;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;box-shadow:0 4px 16px rgba(26,122,74,.25);}
.view-btn:active{opacity:.9;}
.reset-btn{display:block;width:100%;padding:12px;background:#EDE0F5;color:var(--p);border:2px solid #D7BDE2;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:18px;}

/* ── SUMMARY ── */
#scr-sum{display:none;}
.sum-hdr{background:linear-gradient(135deg,var(--g),#0E5E33);border-radius:16px;padding:18px 16px 14px;margin-bottom:16px;color:#fff;text-align:center;}
.sum-hdr h1{font-size:22px;margin-bottom:5px;}
.sum-hdr p{font-size:14px;opacity:.85;}
.sum-meta{background:#E9F7EF;border:2px solid #A9DFBF;border-radius:var(--r);padding:12px 16px;margin-bottom:14px;text-align:center;font-size:15px;font-weight:700;color:#1A5C35;}
.sum-empty{background:#fff;border-radius:var(--r);padding:24px;text-align:center;font-size:15px;color:var(--txl);box-shadow:var(--sh);}
.sum-cat{background:#fff;border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh);}
.sum-cat-title{background:var(--p);color:#fff;padding:10px 14px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;}
.sum-item{padding:10px 14px;font-size:15px;line-height:1.6;border-bottom:1px solid #F4ECF7;color:var(--tx);}
.sum-item:last-child{border-bottom:none;}
.sum-item::before{content:"• ";color:var(--p);font-weight:700;}
.steps-box{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh);}
.steps-box h3{font-size:16px;color:var(--p);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #F4ECF7;}
.step:last-child{border-bottom:none;}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.step-body{flex:1;}
.step-title{font-size:15px;font-weight:700;color:var(--p);margin-bottom:2px;}
.step-desc{font-size:14px;color:var(--tx);line-height:1.6;}
.prayer-box{background:linear-gradient(135deg,#EDE0F5,#D7BDE2);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.prayer-box h3{font-size:16px;color:var(--p);margin-bottom:4px;display:flex;align-items:center;gap:7px;}
.prayer-note{font-size:13px;color:#7D3C98;margin-bottom:12px;}
.prayer-text{font-size:15px;line-height:2.1;color:#4A235A;font-style:italic;font-weight:600;}
.sum-actions{display:flex;gap:10px;margin-bottom:20px;}
.back-btn{flex:1;padding:12px;background:#EDE0F5;color:var(--p);border:2px solid #D7BDE2;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.print-btn{flex:1;padding:12px;background:var(--p);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.footer{text-align:center;font-size:12px;color:#aaa;padding:8px;}
[dir=ltr] .intro ol{padding-left:18px;padding-right:0;}
@media print{
  .lang-row,.role-lang-row,.view-btn,.reset-btn,.back-btn,.print-btn,.counter,.role-badge{display:none!important;}
  body{background:#fff;padding:0;}
  .hdr,.sum-hdr,.sec-title,.sum-cat-title,.prayer-box{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  #scr-exam{display:none!important;}#scr-sum{display:block!important;}#scr-role{display:none!important;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     SCREEN 0: ROLE PICKER
══════════════════════════════════════ -->
<div id="scr-role">
  <div class="role-hdr">
    <div class="role-lang-row">

  </div>
  <div class="role-cards">
    <div class="role-card" id="card-student">
      <div class="r-icon">🙋</div>
      <div class="r-name-ar" id="rc-s-ar">طالب تثبيت</div>

</div>

<!-- ══════════════════════════════════════
     SCREEN 1: EXAM
══════════════════════════════════════ -->
<div id="scr-exam" style="display:none;">
<div class="hdr">
  <div class="lang-row">
    <button class="lang-btn act" id="btn-ar">العربية</button>
    <button class="lang-btn"     id="btn-en">English</button>
  </div>
  <div class="role-badge" id="role-badge-btn">🙋 طالب تثبيت — تغيير ↩</div>
  <h1>🔍 <span id="t-title"></span></h1>
  <p id="t-subtitle"></p>
</div>
<div class="intro" id="intro-box">
  <strong id="t-howTitle"></strong>
  <ol>
    <li id="t-how1"></li><li id="t-how2"></li>
    <li id="t-how3"></li><li id="t-how4"></li>
  </ol>
</div>
<div class="counter" id="counter"></div>
<div id="cats-container"></div>
<button class="view-btn"   id="btn-viewSum"></button>
<button class="reset-btn"  id="btn-reset"></button>
<div class="footer" id="t-footer"></div>
</div>

<!-- ══════════════════════════════════════
     SCREEN 2: SUMMARY
══════════════════════════════════════ -->
<div id="scr-sum">
<div class="sum-hdr">
  <div class="lang-row">
    <button class="lang-btn act" id="sbtn-ar">العربية</button>
    <button class="lang-btn"     id="sbtn-en">English</button>
  </div>
  <h1>📋 <span id="t-sumTitle"></span></h1>
  <p id="t-sumSubtitle"></p>
</div>
<div class="sum-meta" id="sum-meta"></div>
<div id="summary-sins"></div>
<div class="steps-box">
  <h3>🚶 <span id="t-stepsTitle"></span></h3>
  <div id="steps-container"></div>
</div>
<div class="prayer-box">
  <h3>🙏 <span id="t-prayTitle"></span></h3>
  <p class="prayer-note" id="t-prayNote"></p>
  <p class="prayer-text" id="prayer-text"></p>
</div>
<div class="sum-actions">
  <button class="back-btn"  id="btn-backExam"></button>
  <button class="print-btn" id="btn-print"></button>
</div>
<div class="footer" id="t-footer2"></div>
</div>

  ar:'يا إلهي أنا نادمٌ من كل قلبي على إهانتي إيّاك لكوني في الخطيئة.\nقد أهنتُ وأغضبتُ إلهاً هكذا عظيماً وصالحاً محبوباً نظيرك،\nلذا من الآن وصاعداً أنا قاصدٌ بمعونتك الإلهية\nألّا أُغيظك، لأنّي أحبّك فوق كل شيء.',

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let LANG = 'ar';
let ROLE = null; // 'student' or 'godfather'
let CATS = [];
const TICKED = new Set();

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function $(id){ return document.getElementById(id); }

function SL(lang){
  LANG = lang;
  $('app').lang = lang;
  $('app').dir = lang === 'ar' ? 'rtl' : 'ltr';
  // Role picker lang buttons
  ['rl-btn-ar','btn-ar','sbtn-ar'].forEach(id=>{ const e=$(id); if(e) e.classList.toggle('act', lang==='ar'); });
  ['rl-btn-en','btn-en','sbtn-en'].forEach(id=>{ const e=$(id); if(e) e.classList.toggle('act', lang==='en'); });
  // Role picker texts
  const t = T[lang];
  $('rl-title').textContent    = t.rl_title;
  $('rl-subtitle').textContent = t.rl_subtitle;
  $('rc-s-en').textContent = t.rc_s_en;
  $('rc-s-desc').textContent = t.rc_s_desc;
  $('rc-g-en').textContent = t.rc_g_en;
  $('rc-g-desc').textContent = t.rc_g_desc;
  // Exam static strings (if exam is showing)
  if(ROLE){
    const isGod = ROLE === 'godfather';
    $('t-title').textContent    = isGod ? t.title_god    : t.title_student;
    $('t-subtitle').textContent = isGod ? t.subtitle_god : t.subtitle_student;
    $('role-badge-btn').textContent = isGod ? t.badge_god : t.badge_student;
    $('t-howTitle').textContent = t.howTitle;
    $('t-how1').textContent     = t.how1;
    $('t-how2').textContent     = t.how2;
    $('t-how3').textContent     = t.how3;
    $('t-how4').textContent     = t.how4;
    $('btn-viewSum').textContent  = t.viewBtn;
    $('btn-reset').textContent    = t.resetBtn;
    $('t-footer').textContent     = t.footer;
    $('t-sumTitle').textContent   = t.sumTitle;
    $('t-sumSubtitle').textContent= t.sumSubtitle;
    $('btn-backExam').textContent = t.backBtn;
    $('btn-print').textContent    = t.printBtn;
    $('t-stepsTitle').textContent = t.stepsTitle;
    $('t-prayTitle').textContent  = t.prayTitle;
    $('t-prayNote').textContent   = t.prayNote;
    $('t-footer2').textContent    = t.footer;
    // Update question texts already in DOM
    document.querySelectorAll('.q-text').forEach(el=>{
      el.textContent = el.getAttribute('data-'+lang) || el.textContent;
    });
    // Update section titles
    document.querySelectorAll('.sec-title span[data-ci]').forEach(el=>{
      const ci = parseInt(el.getAttribute('data-ci'));
      el.textContent = CATS[ci][lang];
    });
    RS();
    $('prayer-text').style.whiteSpace = 'pre-line';
    $('prayer-text').textContent = PRAYERS[lang];
    UC();
  }
}

function SET_ROLE(role){
  ROLE = role;
  CATS = role === 'godfather' ? CATS_GOD : CATS_STUDENT;
  TICKED.clear();
  RC();
  SL(LANG);
  $('scr-role').style.display = 'none';
  $('scr-exam').style.display = 'block';
  $('scr-sum').style.display  = 'none';
  window.scrollTo(0,0);
}

function GO_ROLE(){
  $('scr-exam').style.display = 'none';
  $('scr-sum').style.display  = 'none';
  $('scr-role').style.display = 'flex';
  $('scr-role').style.flexDirection = 'column';
  window.scrollTo(0,0);
}

function RC(){
  const c = $('cats-container');
  c.innerHTML = CATS.map((cat,ci)=>`
    <div class="section">
      <div class="sec-title">${cat.icon} <span data-ci="${ci}">${cat[LANG]}</span></div>
      <div class="questions">
        ${cat.qs.map((q,qi)=>`
          <div class="q-item${TICKED.has(ci+'-'+qi)?' done':''}" data-ci="${ci}" data-qi="${qi}">
            <div class="q-check">${TICKED.has(ci+'-'+qi)?'✓':''}</div>
            <div class="q-text" data-ar="${q.ar.replace(/"/g,'&quot;')}" data-en="${q.en.replace(/"/g,'&quot;')}">${q[LANG]}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function TQ(ci,qi,el){
  const key = ci+'-'+qi;
  if(TICKED.has(key)){ TICKED.delete(key); el.classList.remove('done'); el.querySelector('.q-check').textContent=''; }
  else { TICKED.add(key); el.classList.add('done'); el.querySelector('.q-check').textContent='✓'; }
  UC();
}

function UC(){
  const total = CATS.reduce((s,c)=>s+c.qs.length, 0);
  const done  = TICKED.size;
  const c = $('counter');
  if(done===0) c.textContent = LANG==='ar'?'لم تختر أيّ شيء بعد — تصفّح الأسئلة بصدق 👇':"You haven't selected anything yet — browse the questions honestly 👇";
  else if(done===total) c.textContent = LANG==='ar'?'✓ انتهيتَ من الفحص — اضغط لعرض قائمتك 🙏':'✓ Done! Press the button to view your list 🙏';
  else c.textContent = LANG==='ar'?`✓ اخترتَ ${done} من ${total} — تابع القراءة 👇`:`✓ Selected ${done} of ${total} — keep reading 👇`;
}

function RS(){
  const c = $('steps-container');
  c.innerHTML = STEPS.map((s,i)=>`
    <div class="step">
      <div class="step-num">${i+1}</div>
      <div class="step-body">
        <div class="step-title">${s.icon} ${s[LANG].title}</div>
        <div class="step-desc">${s[LANG].desc}</div>
      </div>
    </div>
  `).join('');
}

function ShowSum(){
  const t = T[LANG];
  const n = TICKED.size;
  const meta = $('sum-meta');
  if(n===0) meta.textContent = LANG==='ar'?'لم تختر أيّ خطيئة بعد':'No sins selected yet';
  else if(n===1) meta.textContent = t.metaSingle;
  else meta.textContent = t.metaMany(n);
  const sumDiv = $('summary-sins');
  if(n===0){
    sumDiv.innerHTML = `<div class="sum-empty">${t.noSins}</div>`;
  } else {
    let html = '';
    CATS.forEach((cat,ci)=>{
      const tq = cat.qs.filter((_,qi)=>TICKED.has(ci+'-'+qi));
      if(!tq.length) return;
      html += `<div class="sum-cat">
        <div class="sum-cat-title">${cat.icon} ${cat[LANG]}</div>
        ${tq.map(q=>`<div class="sum-item">${q[LANG]}</div>`).join('')}
      </div>`;
    });
    sumDiv.innerHTML = html;
  }
  RS();
  $('prayer-text').style.whiteSpace = 'pre-line';
  $('prayer-text').textContent = PRAYERS[LANG];
  $('scr-exam').style.display = 'none';
  $('scr-sum').style.display  = 'block';
  window.scrollTo(0,0);
}

function ShowExam(){
  $('scr-sum').style.display  = 'none';
  $('scr-exam').style.display = 'block';
  window.scrollTo(0,0);
}

function ResetAll(){
  TICKED.clear();
  document.querySelectorAll('.q-item').forEach(el=>{
    el.classList.remove('done');
    el.querySelector('.q-check').textContent = '';
  });
  UC();
}

// ═══════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function(){
  // Role picker lang buttons
  $('rl-btn-ar').addEventListener('click', ()=>SL('ar'));
  $('rl-btn-en').addEventListener('click', ()=>SL('en'));
  // Role cards
  $('card-student').addEventListener('click',   ()=>SET_ROLE('student'));
  $('card-godfather').addEventListener('click',  ()=>SET_ROLE('godfather'));
  // Role badge (change role)
  $('role-badge-btn').addEventListener('click', GO_ROLE);
  // Lang buttons in exam
  $('btn-ar').addEventListener('click', ()=>SL('ar'));
  $('btn-en').addEventListener('click', ()=>SL('en'));
  // Lang buttons in summary
  $('sbtn-ar').addEventListener('click', ()=>SL('ar'));
  $('sbtn-en').addEventListener('click', ()=>SL('en'));
  // Exam actions
  $('btn-viewSum').addEventListener('click', ShowSum);
  $('btn-reset').addEventListener('click',   ResetAll);
  // Summary actions
  $('btn-backExam').addEventListener('click', ShowExam);
  $('btn-print').addEventListener('click',    ()=>window.print());
  // Delegated question tap
  document.getElementById('cats-container').addEventListener('click', function(e){
    const item = e.target.closest('.q-item');
    if(item) TQ(parseInt(item.dataset.ci), parseInt(item.dataset.qi), item);
  });
  // Init lang display
  SL('ar');
});
</script>
</body>
</html>
